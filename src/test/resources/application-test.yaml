spring:
  application:
    name: aiyl_bank_test_aman_nazarkulov

  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: sa
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true

server:
  port: 8080

logging:
  level:
    com.github.amangusss.aiyl_bank_test_aman_nazarkulov: INFO

